<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel='shortcut icon' href='/anh/favicon.ico' />
    <title>Đăng nhập | Quản lý khách sạn</title>
    <link rel='stylesheet' href='/global-typography.css'>
    <style>
        :root {
            --primary-color: #ff385c;
            --secondary-color: #e31b4c;
            --text-dark: #222222;
            --text-gray: #717171;
            --bg-light: #f7f7f7;
            --white: #ffffff;
            --shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/anh/anhnen.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar */
        header {
            background: var(--white);
            box-shadow: 0 1px 12px rgba(0,0,0,0.1);
        }

        .navbar {
            display: flex;
            justify-content: center;
            padding: 15px 5%;
        }

        .navbar .logo h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        /* Main Container */
        .main-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-container {
            background-color: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 30px;
            color: var(--text-dark);
            font-size: 28px;
            font-weight: 700;
            cursor: pointer; /* Giữ tính năng ẩn chuyển hướng admin */
        }

        /* Input group */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 56, 92, 0.1);
            outline: none;
        }

        /* Buttons */
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        #regbutton {
            width: 100%;
            padding: 12px;
            background: none;
            border: 1px solid #ddd;
            border-radius: 10px;
            color: var(--text-dark);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        #regbutton:hover {
            background-color: #f0f0f0;
            border-color: #999;
        }

        /* Footer */
        footer {
            background-color: var(--white);
            padding: 40px 5% 20px;
            border-top: 1px solid #eee;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-column h4 {
            font-size: 16px;
            color: var(--text-dark);
            margin-bottom: 15px;
            cursor: pointer; /* Cho tính năng ẩn nvlogin */
        }

        .footer-column p {
            font-size: 14px;
            color: var(--text-gray);
            margin: 8px 0;
        }

        .footer-column img {
            height: 25px;
            margin-right: 10px;
            margin-top: 10px;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 30px;
            margin-top: 30px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: var(--text-gray);
        }

        @media (max-width: 480px) {
            .login-container { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">
                <a href="/trangchu" style="text-decoration: none;">
                    <h1>Quản lý khách sạn</h1>
                </a>
            </div>
        </div>
    </header>

    <div class="main-content">
        <div class="login-container">
            <h2 id="admin">Đăng nhập</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Nhập email của bạn" required>
                </div>
                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required minlength="8" maxlength="15">
                </div>
                <button type="submit" id="loginSubmit">Tiếp tục</button>
            </form>
            <button type="button" id="regbutton">Tạo tài khoản mới</button>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-column">
                <h4>Hỗ trợ</h4>
                <p>📞 Hotline: 1900 123 456</p>
                <p>support@quanlykhachsan.com</p>
                <p>Cơ chế giải quyết khiếu nại</p>
            </div>
            <div class="footer-column">
                <h4 id="nvlogin">Giới thiệu</h4>
                <p>Về chúng tôi</p>
                <p>Cơ hội nghề nghiệp</p>
                <p>Quy chế hoạt động</p>
            </div>
            <div class="footer-column">
                <h4>Thanh toán</h4>
                <img src="/anh/bankpay.svg" alt="BankPay" />
                <img src="/anh/visa.svg" alt="Visa" />
            </div>
            <div class="footer-column">
                <h4>Ứng dụng</h4>
                <img src="/anh/AppStore.svg" alt="App Store" style="width: 110px;"/>
                <img src="/anh/CHPlay.svg" alt="Google Play" style="width: 110px;"/>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 Quản lý khách sạn, Inc. • Bảo mật • Điều khoản • Sơ đồ trang web</p>
        </div>
    </footer>

    <script>
        // Các sự kiện chuyển hướng ẩn
        document.getElementById('regbutton').addEventListener("click", function () {
            window.location.href = "/register"; 
        });
        document.getElementById('nvlogin').addEventListener("click", function () {
            window.location.href = "/nvlogin"; 
        });
        document.getElementById('admin').addEventListener("click", function () {
            window.location.href = "/adminlogin"; 
        });

        // Xử lý Login Form
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(data => {
                        throw new Error(data.message || 'Đăng nhập không thành công');
                    });
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    sessionStorage.setItem('username', data.username);
                    sessionStorage.setItem('customerId', data.customerId);
                    window.location.href = "/trangchu";
                } else {
                    alert(data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Lỗi: ' + error.message);
            });
        });
    </script>
</body>
</html>
