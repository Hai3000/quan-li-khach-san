<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='shortcut icon' href='/anh/favicon.ico' />
    <title>404 Not Found</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            text-align: center;
        }
        h1 {
            font-size: 48px;
            color: #dc3545;
        }
        p {
            font-size: 20px;
            color: #495057;
        }
        img {
            max-width: 50%;
            height: 50%;
            margin-top: 20px;
        }
        a {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>404 NOT FOUND</h1>
    <p>Bạn đã không tìm thấy gì nhưng bạn đã tìm thấy lãnh địa của Ma Vương Tulen.</p>
    <img class = "404" src ="anh/404.jpg" alt="Ma Vương Tulen">
    <audio id="errorSound" src="audio/404.mp3" preload="auto" loop></audio>
    <script>
        // Tự động phát âm thanh khi trang được tải
        window.onload = function() {
            const audio = document.getElementById('errorSound');
            audio.play().catch(error => {
                console.error('Âm thanh không thể phát: ', error);
            });
        };
    </script>
</body>
</html>
